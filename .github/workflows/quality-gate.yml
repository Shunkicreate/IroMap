name: quality-gate

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Markdown lint
        run: pnpm run lint:md

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build cube-point WASM artifact
        run: pnpm run build:wasm:cube-points
        working-directory: web

      - name: Verify generated WASM artifact is committed
        run: git diff --exit-code -- web/src/domain/photo-analysis/cube-point-kernel/generated/cube-point-kernel-wasm-bytes.ts

      - name: Lint
        run: pnpm run lint
        working-directory: web

      - name: Format check
        run: pnpm run format:check
        working-directory: web

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web

      - name: Run E2E tests
        run: pnpm run test:e2e
        working-directory: web
