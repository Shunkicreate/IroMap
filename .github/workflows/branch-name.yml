name: branch-name

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming rule
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == "main" || "$HEAD_REF" == feature/* ]]; then
            echo "Branch name is valid: $HEAD_REF"
            exit 0
          fi

          echo "Invalid branch: $HEAD_REF"
          echo "Use 'feature/*' or 'main'."
          exit 1
